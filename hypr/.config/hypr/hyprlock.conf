
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
}


background {
    monitor =
    path = ~/.config/wallpaper/13.png
    blur_passes = 3       
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 90
    font_family = Noto Sans Bold
    position = 0, 150
    halign = center
    valign = center
}


label {
    monitor =
    text = cmd[update:43200000] echo "$(date +'%A, %d %B')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = Noto Sans
    position = 0, 250
    halign = center
    valign = center
}


image {
    monitor =
    path = ~/.config/wallpaper/icons/catfumador.png 
    size = 110
    rounding = -1
    border_size = 3
    border_color = rgba(255, 255, 255, 0.2)
    position = 0, -40
    halign = center
    valign = center
}


label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 14
    font_family = Noto Sans
    position = 0, -120
    halign = center
    valign = center
}


input-field {
    monitor =
    size = 240, 45
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1) 
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff80">Pass</span>
    rounding = 25
    check_color = rgba(255, 255, 255, 0.3)
    fail_color = rgba(255, 50, 50, 0.5)
    position = 0, -180
    halign = center
    valign = center
}

